<!DOCTYPE html>
<html>
<head>
<title>Quiz Result</title>
<style>
body{background:black;color:#0ff;text-align:center;font-family:Arial;padding-top:100px;}
.box{border:2px solid #0ff;display:inline-block;padding:30px;border-radius:15px;box-shadow:0 0 20px #0ff;}
a{display:block;margin-top:20px;color:gold;text-decoration:none;font-size:18px;}
</style>
</head>
<body>
<div class="box">
<h1>🎉 Quiz Completed</h1>
<h2>Your Score: {{ score }}/{{ total }}</h2>
<a href="/">Play Again</a>
</div>
</body>
</html>
